apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: koreanmate-backend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/elkim-ea/Portfolio_2nd.git
    targetRevision: eks
    path: deploy/k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: koreanmate

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
